spring:
  datasource:
    url: jdbc:h2:mem:oms_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  kafka:
    admin:
      auto-create: false
    listener:
      auto-startup: false

logging:
  level:
    com.semicolon.oms: DEBUG
