name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME || vars.DOCKERHUB_USERNAME }}/oms-backend

jobs:
  test-app:
    name: Unit Tests
    runs-on: self-hosted
    container: maven:3.9-eclipse-temurin-17
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Tests
        run: mvn -B test

  build-push-deploy:
    name: Build, Push and Deploy
    needs: test-app
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Docker Image Tag
        id: vars
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME || vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ steps.vars.outputs.image_tag }} -t ${{ env.DOCKER_IMAGE }}:latest .
          docker push ${{ env.DOCKER_IMAGE }}:${{ steps.vars.outputs.image_tag }}
          docker push ${{ env.DOCKER_IMAGE }}:latest

      - name: Stop and Remove Old Container
        run: |
          docker stop oms-backend || true
          docker rm oms-backend || true

      - name: Run New Container
        run: |
          docker run -d \
            --name oms-backend \
            --restart unless-stopped \
            --network oms_network \
            -p 8080:8080 \
            -e SPRING_PROFILES_ACTIVE=prod \
            -e DB_HOST="${{ secrets.DB_HOST }}" \
            -e DB_PORT="${{ secrets.DB_PORT }}" \
            -e DB_NAME="${{ secrets.DB_NAME }}" \
            -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
            -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            -e REDIS_HOST="${{ secrets.REDIS_HOST }}" \
            -e REDIS_PORT="${{ secrets.REDIS_PORT }}" \
            -e KAFKA_BOOTSTRAP_SERVERS="${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}" \
            -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            ${{ env.DOCKER_IMAGE }}:${{ steps.vars.outputs.image_tag }}

      - name: Clean up unused Docker images
        run: docker image prune -af
