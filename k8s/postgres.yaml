apiVersion: apps/v1
kind: Deployment
metadata:
  name: oms-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oms-postgres
  template:
    metadata:
      labels:
        app: oms-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "oms_db"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: oms-secret
                  key: DB_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oms-secret
                  key: DB_PASSWORD
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: oms-postgres
spec:
  ports:
    - port: 5432
  selector:
    app: oms-postgres
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
